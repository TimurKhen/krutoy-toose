<div class="improvement">
  <div class="content">
    <div class="top">
      <h4 class="title">{{ data().title }}</h4>
      @if (data().description) {
        <p class="description">{{ data().description }}</p>
      }
    </div>

    <button (click)="buyObject($event)" matRipple class="can-buy">Купить за {{ data().price | shortNumber }} звёзд</button>
  </div>
  <div class="image">
    <img [src]="data().imageUrl">
  </div>
</div>
