<div class="container">
  <div class="search">
    <app-search-bar></app-search-bar>
  </div>

  @if (search.hasValue()) {
    @if (teams().length > 0) {
      <div class="teams">
        @for (team of teams(); track team) {
          <app-team [data]="team"></app-team>
        }
      </div>
    } @else {
      <div class="no-found">
        <img src="animated/fullduckstwo_agadkaiaatonuuc.gif">
        <h3>Ничего не найдено</h3>
      </div>
    }
  } @else if (search.error()) {
    <div>Could not load user information</div>
  } @else if (search.isLoading()) {
    <div class="loading"></div>
  }
</div>

<button matRipple class="add" (click)="setSearch($event)">
  <img src="icons/plus.svg">
</button>
