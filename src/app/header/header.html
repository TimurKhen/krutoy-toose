<div class="header">
  @if (userData(); as user) {
    <div class="user-data">
      <!-- Выводим first_name вместо name -->
      <p>{{ user.first_name }}</p>
      <p class="score">{{ userScore() | number }}</p>
    </div>
  } @else {
    <div class="user-data">
      <p>Загрузка игрока...</p>
      <p class="score">{{ userScore() | number }}</p>
    </div>
  }
</div>
